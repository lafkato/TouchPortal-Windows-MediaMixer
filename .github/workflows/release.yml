name: Release plugin

on:
  push:
    tags:
      - '*'

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build plugin
        working-directory: src
        run: python build.py

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: "Automated release for tag ${{ github.ref_name }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find generated TPP
        id: find_tpp
        run: |
          $tpp = Get-ChildItem -Path "src" -Filter "*.tpp" | Select-Object -First 1
          if (-not $tpp) { throw 'No TPP file found in src directory' }
          echo "tpp_path=$($tpp.FullName)" >> $GITHUB_OUTPUT
          echo "tpp_name=$($tpp.Name)" >> $GITHUB_OUTPUT

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_tpp.outputs.tpp_path }}
          asset_name: ${{ steps.find_tpp.outputs.tpp_name }}
          asset_content_type: application/octet-stream
